services:
  app:
    image: fireflyiii/core:latest
    ports:
      - "8080:8080"
    environment:
      APP_KEY: base64:6+wBcMEC8FxtjEdG7ggxDkbRAW7ZUSaLTdfuu5drCGY=
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: firefly
      DB_USERNAME: firefly
      DB_PASSWORD: secret
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: banking-db
    restart: always
    environment:
      MYSQL_DATABASE: firefly
      MYSQL_USER: firefly
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql 

volumes:
  db_data: